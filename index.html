<html>
  <head>
     <style>
      #div1{
        background-color:red;
        height:20%;
        text-align:center;
        }
      #div2{
        background-color:yellow;
        height:60%;
        text-align:center;
        }
      #div3{
        background-color:green;
        height:20%;
        text-align:center;
        }
        b{
           font-size:4em;
           color:white;
          }
        #led1{
           height:30%;
           width:30%;
           accent-color:red;
          }
         button{
           height:20%;
           width:30%;
           font-size:3em;
           color:red;
           background-color:pink;
           border:3px solid red;
           border-radius:20px;
         }
     </style>
     <script>
              function lamp_on( )
              {
	   document.getElementById('led1').checked=true;
              }
               function lamp_off( )	 
             {
                   document.getElementById('led1').checked=false;
              }
     </script>
  </head>
  <body>
         <div id='div1' ><b>램프 제어기</b></div >
         <div id='div2' >
                <br><br><br><br>
                <input type='radio' id='led1'>
                <br><br><br>
                <button onclick='lamp_on( );'> ON  </button>
                <button onclick='lamp_off( );'> OFF </button>		
         </div >
         <div id='div3' ><b>노 영 희</b></div >
            
   </body>
</html>
